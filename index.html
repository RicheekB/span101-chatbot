<!DOCTYPE html>
<html>
<head>
  <title>SPAN 101 Chatbox</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .chatbox {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 16px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .messages {
      height: 320px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 10px;
      border-radius: 14px;
      max-width: 80%;
      line-height: 1.4;
    }

    .bot {
      background: #e5e7eb;
      align-self: flex-start;
    }

    .user {
      background: #3b82f6;
      color: white;
      align-self: flex-end;
    }

    .inputRow {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    button {
      padding: 10px 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <div class="chatbox">
    <h1>SPAN 101 Chatbox</h1>

    <div id="messages" class="messages">
      <div class="message bot">
        Hi! I'm your SPAN 101 syllabus helper for Professor Ayari Valenzuela Macias. Ask me anything about the course!
      </div>
    </div>

    <div class="inputRow">
      <input id="userInput" placeholder="Ask about the syllabus..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function responses(message) {
      const msg = message.toLowerCase();

      if (
        msg.includes("contact") ||
        msg.includes("email") ||
        msg.includes("professor") ||
        msg.includes("instructor") ||
        msg.includes("canvas") ||
        msg.includes("reach") ||
        msg.includes("message")
      ) {
        return "You can contact Professor Ayari Valenzuela Macias by email at avalenzuela@csusm.edu or through Canvas. Expect a response the same day during weekdays, and a bit longer on weekends.";
      }

      if (
        msg.includes("office hours") ||
        msg.includes("office hour") ||
        msg.includes("zoom") ||
        msg.includes("appointment") ||
        msg.includes("meet") ||
        msg.includes("meeting") ||
        msg.includes("available") ||
        msg.includes("availability")
      ) {
        return "Office hours are online via Zoom (https://csusm.zoom.us/my/csusm) and by appointment. Tuesdays/Thursdays are busy, but mornings/evenings work. Mondays, Wednesdays, and Fridays are more open. Also, you earn 3% just for meeting with the professor!";
      }

      if (
        msg.includes("start") ||
        msg.includes("begin") ||
        msg.includes("first") ||
        msg.includes("intro") ||
        msg.includes("introductory") ||
        msg.includes("video") ||
        msg.includes("quiz") ||
        msg.includes("syllabus quiz")
      ) {
        return "To get started: watch the introductory video, read the syllabus, and complete the syllabus quiz.";
      }

      if (
        msg.includes("grade") ||
        msg.includes("grading") ||
        msg.includes("points") ||
        msg.includes("percentage") ||
        msg.includes("percent") ||
        msg.includes("worth") ||
        msg.includes("score") ||
        msg.includes("requirements")
      ) {
        return "See 'Course Requirements': Group work (20%), Homework (25%), Oral Presentation (12%), Skits (20%), Composition (10%), Final Exam (10%), Meet the Professor (3%).";
      }

      if (
        msg.includes("group work") ||
        msg.includes("group") ||
        msg.includes("groups") ||
        msg.includes("record") ||
        msg.includes("recording") ||
        msg.includes("session") ||
        msg.includes("sessions") ||
        msg.includes("30 minutes")
      ) {
        return "Group work is 20% of your grade. You must meet 6 times for 30 minutes each in small groups and record your sessions.";
      }

      if (
        msg.includes("homework") ||
        msg.includes("assignment") ||
        msg.includes("assignments") ||
        msg.includes("mindtap") ||
        msg.includes("weekly") ||
        msg.includes("sunday") ||
        msg.includes("midnight") ||
        msg.includes("due") ||
        msg.includes("deadline")
      ) {
        return "Homework is 25% of your grade. Complete MindTap assignments weekly by Sunday at midnight.";
      }

      if (
        msg.includes("final") ||
        msg.includes("exam") ||
        msg.includes("test") ||
        msg.includes("may 7") ||
        msg.includes("may 10") ||
        msg.includes("comprehensive") ||
        msg.includes("online exam")
      ) {
        return "The final exam is worth 10% and must be taken between May 7–10. It is comprehensive and online.";
      }

      if (
        msg.includes("oral") ||
        msg.includes("presentation") ||
        msg.includes("speaking")
      ) {
        return "The oral presentation is worth 12% of your grade.";
      }

      if (
        msg.includes("skit") ||
        msg.includes("skits") ||
        msg.includes("acting")
      ) {
        return "Skits are worth 20% of your grade.";
      }

      if (
        msg.includes("composition") ||
        msg.includes("essay") ||
        msg.includes("writing") ||
        msg.includes("paper")
      ) {
        return "The composition is worth 10% of your grade.";
      }

      return "I’m here to help with the syllabus! Try asking about grading, homework, group work, office hours, the final exam, presentations, skits, or composition.";
    }

    function sendMessage() {
      const input = document.getElementById("userInput");
      const messages = document.getElementById("messages");
      const text = input.value.trim();

      if (!text) return;

      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.textContent = text;
      messages.appendChild(userMsg);

      const botMsg = document.createElement("div");
      botMsg.className = "message bot";
      botMsg.textContent = responses(text);
      messages.appendChild(botMsg);

      input.value = "";
      messages.scrollTop = messages.scrollHeight;
    }

    document.getElementById("userInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
